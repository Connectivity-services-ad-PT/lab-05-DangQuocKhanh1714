services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fit4110-core-api-lab05
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - team-internal
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  db:
    image: postgres:15-alpine
    container_name: fit4110-core-db-lab05
    environment:
      POSTGRES_USER: lab05
      POSTGRES_PASSWORD: lab05pass
      POSTGRES_DB: core_business
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - team-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab05"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ai-vision:
    image: stoplight/prism:4.10.5
    container_name: fit4110-core-ai-vision-lab05
    command: mock -h 0.0.0.0 -p 4010 /contracts/ai-vision.openapi.yaml
    ports:
      - "4011:4010"
    volumes:
      - ./contracts:/contracts
    networks:
      - team-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4010/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  team-internal:
    driver: bridge

volumes:
  postgres_data: